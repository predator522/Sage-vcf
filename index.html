<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage VCF · Contact Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... (same styles as before) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg: #f2f5fa;
            --surface: rgba(255, 255, 255, 0.65);
            --surface-solid: #ffffff;
            --text: #1e293b;
            --text-secondary: #475569;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 20px 40px -12px rgba(0, 20, 30, 0.15);
            --glass: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary: #6b4cff;
            --primary-light: #8b6eff;
            --primary-dark: #4f33cc;
            --gradient: linear-gradient(135deg, #6b4cff, #a78bfa);
            --radius: 28px;
            --radius-sm: 16px;
            --transition: 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --badge-closed: #e11d48;
            --badge-open: #0b8a5e;
            --whatsapp: #25D366;
        }
        [data-theme="dark"] {
            --bg: #0b1120;
            --surface: rgba(20, 30, 50, 0.7);
            --surface-solid: #1a2640;
            --text: #e8edf5;
            --text-secondary: #b0c0d8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.7);
            --glass: rgba(15, 25, 45, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition), color var(--transition);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(at 10% 30%, rgba(107, 76, 255, 0.06) 0, transparent 60%);
        }
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            padding: 24px 28px;
            transition: background var(--transition);
        }
        .navbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 28px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
        }
        .brand i {
            color: var(--primary);
            font-size: 1.8rem;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }
        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }
        .nav-btn.active {
            background: var(--primary);
            color: white;
        }
        .theme-toggle {
            background: var(--surface-solid);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text);
        }
        .theme-toggle i {
            font-size: 1.1rem;
        }
        .card {
            background: var(--surface-solid);
            backdrop-filter: blur(4px);
            border-radius: var(--radius-sm);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .hero {
            text-align: center;
            padding: 30px 10px 18px;
        }
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 12px auto;
        }
        .btn {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(107, 76, 255, 0.25);
        }
        .btn:hover {
            transform: scale(1.02);
            background: var(--primary-dark);
            box-shadow: 0 12px 28px rgba(107, 76, 255, 0.35);
        }
        .btn-secondary {
            background: var(--surface-solid);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }
        .btn-sm {
            padding: 8px 18px;
            font-size: 0.9rem;
        }
        .badge {
            background: var(--badge-open);
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }
        .badge.closed {
            background: var(--badge-closed);
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.95rem;
            transition: var(--transition);
            color: var(--text);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(107, 76, 255, 0.15);
        }
        .flex {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mt-2 {
            margin-top: 16px;
        }
        .mb-2 {
            margin-bottom: 16px;
        }
        .text-secondary {
            color: var(--text-secondary);
        }
        .progress {
            height: 8px;
            background: var(--border);
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.4s;
        }
        .table-wrap {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 12px 6px 8px 0;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--text-secondary);
        }
        td {
            padding: 10px 6px 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 6px;
            border-radius: 30px;
            transition: var(--transition);
        }
        .icon-btn:hover {
            background: rgba(107, 76, 255, 0.08);
            color: var(--primary);
        }
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 360px;
        }
        .toast {
            background: var(--surface-solid);
            backdrop-filter: blur(10px);
            padding: 16px 22px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            border: 1px solid var(--border);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s;
        }
        .toast i {
            font-size: 1.3rem;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fade 0.2s;
        }
        .modal-content {
            max-width: 480px;
            width: 100%;
            background: var(--surface-solid);
            border-radius: var(--radius-sm);
            padding: 30px;
            box-shadow: var(--shadow);
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes fade {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .empty-state {
            text-align: center;
            padding: 40px 10px;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            opacity: 0.5;
            margin-bottom: 12px;
        }
        .db-status {
            background: var(--bg);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .db-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .db-status .dot.online {
            background: #0b8a5e;
        }
        .db-status .dot.offline {
            background: #e11d48;
        }
        .db-status .dot.connecting {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .whatsapp-group-banner {
            background: var(--whatsapp);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0;
        }
        .whatsapp-group-banner i {
            font-size: 1.5rem;
        }
        .copy-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .copy-btn:hover {
            background: var(--primary);
            color: white;
        }
        .admin-panel {
            background: var(--surface-solid);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 860px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .grid-3 {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 500px) {
            .grid-3 {
                grid-template-columns: 1fr;
            }
            .app-container {
                padding: 16px;
            }
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <nav class="navbar">
            <div class="brand"><i class="fas fa-address-book"></i> Sage VCF</div>
            <div class="nav-links">
                <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i> Home</button>
                <button class="nav-btn" data-page="create"><i class="fas fa-plus-circle"></i> Create</button>
                <button class="nav-btn" data-page="dashboard"><i class="fas fa-chart-simple"></i> Dashboard</button>
                <button class="nav-btn" data-page="admin"><i class="fas fa-lock"></i> Admin</button>
            </div>
            <div style="display:flex;gap:12px;align-items:center;">
                <span class="db-status">
                    <span class="dot connecting" id="dbStatusDot"></span>
                    <span id="dbStatusText">Connecting...</span>
                </span>
                <div class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                    <span id="themeLabel">Dark</span>
                </div>
            </div>
        </nav>
        <div id="pageContent"></div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script>
        // ============================================================
        // CONFIGURATION - UPDATED FOR CORS FIX
        // ============================================================
        const CONFIG = {
            // Option 1: Direct Railway URL (if CORS is fixed)
            API_URL: 'https://vcf-backend-production.up.railway.app/api',
            
            // Option 2: If using Vercel proxy (uncomment this, comment the above)
            // API_URL: '/api',
            
            ADMIN_PASSWORD: 'admin123'
        };

        // ============================================================
        // API CLIENT WITH BETTER ERROR HANDLING
        // ============================================================
        const API = {
            async request(endpoint, method = 'GET', data = null) {
                const url = `${CONFIG.API_URL}${endpoint}`;
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    mode: 'cors',
                };
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                try {
                    console.log(`📤 ${method} ${url}`);
                    const response = await fetch(url, options);
                    console.log(`📥 Response status: ${response.status}`);
                    
                    if (!response.ok) {
                        const errorText = await response.text();
                        console.error('Error response:', errorText);
                        throw new Error(`Server error (${response.status}): ${errorText.substring(0, 100)}`);
                    }
                    
                    const result = await response.json();
                    console.log('✅ Response:', result);
                    return result;
                } catch (error) {
                    console.error('❌ API Error:', error);
                    throw error;
                }
            },

            // Sessions
            getSessions() {
                return this.request('/sessions');
            },
            getSession(sessionId) {
                return this.request(`/sessions/${sessionId}`);
            },
            createSession(sessionData) {
                return this.request('/sessions', 'POST', sessionData);
            },
            updateSession(sessionId, data) {
                return this.request(`/sessions/${sessionId}`, 'PUT', data);
            },
            deleteSession(sessionId) {
                return this.request(`/sessions/${sessionId}`, 'DELETE');
            },

            // Participants
            getParticipants(sessionId) {
                return this.request(`/participants/${sessionId}`);
            },
            addParticipant(data) {
                return this.request('/participants', 'POST', data);
            },
            deleteParticipant(sessionId, participantId) {
                return this.request(`/participants/${sessionId}/${participantId}`, 'DELETE');
            },

            // Groups
            getGroups() {
                return this.request('/groups');
            },
            getGroup(sessionId) {
                return this.request(`/groups/${sessionId}`);
            },
            createGroup(data) {
                return this.request('/groups', 'POST', data);
            },

            // Admin
            verifyAdmin(password) {
                return this.request('/admin/verify', 'POST', { password });
            },
            getStats() {
                return this.request('/admin/stats');
            }
        };

        // ============================================================
        // APPLICATION STATE
        // ============================================================
        let currentPage = 'home';
        let currentSessionId = null;
        let darkMode = localStorage.getItem('sage_dark') === 'true';
        let allSessions = [];
        let allGroups = [];
        let allParticipants = {};

        if (darkMode) document.documentElement.setAttribute('data-theme', 'dark');

        // Helpers
        function genId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function toast(msg, icon = 'fa-check-circle', color = '#6b4cff') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i class="fas ${icon}" style="color:${color}"></i> ${msg}`;
            c.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                setTimeout(() => t.remove(), 300);
            }, 3500);
        }

        function renderModal(html) {
            document.getElementById('modalContainer').innerHTML = html;
        }

        function closeModal() {
            document.getElementById('modalContainer').innerHTML = '';
        }
        window.closeModal = closeModal;

        function updateDbStatus(connected, message = '') {
            const dot = document.getElementById('dbStatusDot');
            const text = document.getElementById('dbStatusText');
            if (dot) {
                dot.className = `dot ${connected ? 'online' : 'offline'}`;
            }
            if (text) {
                text.textContent = connected ? 'MongoDB Connected' : (message || 'Offline');
            }
        }

        // ============================================================
        // DATA LOADING
        // ============================================================
        async function loadAllData() {
            try {
                console.log('🔄 Loading data from server...');
                updateDbStatus(false, 'Connecting...');
                
                const [sessions, groups] = await Promise.all([
                    API.getSessions(),
                    API.getGroups()
                ]);
                
                console.log(`📊 Loaded ${sessions.length} sessions, ${groups.length} groups`);
                allSessions = sessions;
                allGroups = groups;
                
                // Load participants for each session
                for (const session of sessions) {
                    const participants = await API.getParticipants(session.sessionId);
                    allParticipants[session.sessionId] = participants;
                    console.log(`👥 Session ${session.sessionId}: ${participants.length} participants`);
                }
                
                updateDbStatus(true);
                toast('Connected to server!', 'fa-check-circle', '#0b8a5e');
                return true;
            } catch (error) {
                console.error('❌ Failed to load data:', error);
                updateDbStatus(false, 'Connection Failed');
                toast('⚠️ Failed to connect to server. Using demo mode.', 'fa-exclamation-triangle', '#f59e0b');
                
                // If server fails, use localStorage as fallback
                const localSessions = JSON.parse(localStorage.getItem('sage_sessions') || '[]');
                const localGroups = JSON.parse(localStorage.getItem('sage_groups') || '[]');
                if (localSessions.length > 0) {
                    allSessions = localSessions;
                    allGroups = localGroups;
                    for (const session of localSessions) {
                        const participants = JSON.parse(localStorage.getItem('sage_participants_' + session.sessionId) || '[]');
                        allParticipants[session.sessionId] = participants;
                    }
                    toast('Using cached data (offline mode)', 'fa-info-circle', '#f59e0b');
                }
                
                return false;
            }
        }

        // ============================================================
        // RENDER ENGINE
        // ============================================================
        async function render(page) {
            currentPage = page;
            document.querySelectorAll('.nav-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.page === page)
            );
            const container = document.getElementById('pageContent');

            try {
                await loadAllData();
                
                switch (page) {
                    case 'home':
                        container.innerHTML = renderHome();
                        break;
                    case 'create':
                        container.innerHTML = renderCreate();
                        break;
                    case 'dashboard':
                        if (!currentSessionId) {
                            toast('Select a session from Home', 'fa-info-circle', '#f59e0b');
                            container.innerHTML =
                                `<div class="empty-state"><i class="fas fa-folder-open"></i><p>Go to Home and click "Manage" on any session</p></div>`;
                        } else {
                            container.innerHTML = await renderDashboard(currentSessionId);
                        }
                        break;
                    case 'admin':
                        container.innerHTML = await renderAdmin();
                        break;
                    default:
                        container.innerHTML = renderHome();
                }
            } catch (error) {
                container.innerHTML =
                    `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error: ${error.message}</p></div>`;
            }
            attachEvents();
        }

        // ----- HOME PAGE -----
        function renderHome() {
            let cards = allSessions.map(s => {
                const participants = allParticipants[s.sessionId] || [];
                const closed = s.status === 'closed';
                const group = allGroups.find(g => g.sessionId === s.sessionId);

                return `<div class="card" style="padding:16px;">
                            <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;">
                                <div>
                                    <strong>${s.name}</strong>
                                    <div class="text-secondary" style="font-size:0.85rem;">${s.organizer} · ${participants.length}/${s.target}</div>
                                </div>
                                <span class="badge ${closed ? 'closed' : ''}">${closed ? 'CLOSED' : 'OPEN'}</span>
                            </div>
                            ${group ? `<div style="margin:8px 0;font-size:0.85rem;color:var(--whatsapp);"><i class="fab fa-whatsapp"></i> Group: ${group.name}</div>` : ''}
                            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
                                <button class="btn btn-secondary btn-sm" data-action="join" data-id="${s.sessionId}"><i class="fas fa-sign-in-alt"></i> Join</button>
                                <button class="btn btn-secondary btn-sm" data-action="manage" data-id="${s.sessionId}"><i class="fas fa-chart-simple"></i> Manage</button>
                                <button class="btn btn-secondary btn-sm" data-action="delete" data-id="${s.sessionId}"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
            }).join('');

            return `
                    <div class="hero">
                        <h1>Sage VCF · Contact Exchange</h1>
                        <p>Create a session, share the WhatsApp group, collect contacts. Auto‑generates VCF when full.</p>
                        <button class="btn" data-page="create"><i class="fas fa-plus-circle"></i> New Session</button>
                    </div>
                    <div class="grid-3">${cards || `<div class="empty-state"><i class="fas fa-users-slash"></i><p>No sessions yet. Create one!</p></div>`}</div>
                `;
        }

        // ----- CREATE SESSION -----
        function renderCreate() {
            return `<div class="card" style="max-width:640px;margin:0 auto;">
                        <h2><i class="fas fa-pen-fancy" style="color:var(--primary)"></i> Create Session</h2>
                        <p class="text-secondary" style="margin-bottom:16px;">Participants must join the WhatsApp group to receive the VCF file.</p>
                        <form id="createForm">
                            <div class="form-group">
                                <label>Session Name *</label>
                                <input class="form-control" id="sName" placeholder="e.g. Tech Meetup 2026" required>
                            </div>
                            <div class="form-group">
                                <label>Organizer Name *</label>
                                <input class="form-control" id="sOrg" placeholder="Your full name" required>
                            </div>
                            <div class="form-group">
                                <label>WhatsApp Group Link * <i class="fab fa-whatsapp" style="color:var(--whatsapp);"></i></label>
                                <input class="form-control" id="sWhatsapp" placeholder="https://chat.whatsapp.com/..." required>
                                <small class="text-secondary">Participants must join this group to receive the VCF file.</small>
                            </div>
                            <div class="form-group">
                                <label>WhatsApp Group Name *</label>
                                <input class="form-control" id="sGroupName" placeholder="e.g. Tech Meetup Group" required>
                            </div>
                            <div class="form-group">
                                <label>Target Participants *</label>
                                <input class="form-control" id="sTarget" type="number" min="2" max="200" value="5" required>
                            </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea class="form-control" id="sDesc" rows="2" placeholder="Any extra info about the event"></textarea>
                            </div>
                            <button class="btn" type="submit"><i class="fas fa-rocket"></i> Create Session</button>
                        </form>
                    </div>`;
        }

        // ----- DASHBOARD -----
        async function renderDashboard(sessionId) {
            const session = allSessions.find(s => s.sessionId === sessionId);
            if (!session) return `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Session not found</p></div>`;

            const participants = allParticipants[sessionId] || [];
            const group = allGroups.find(g => g.sessionId === sessionId);
            const closed = session.status === 'closed';
            const progress = Math.min(100, (participants.length / session.target) * 100);

            let rows = participants.map((p) =>
                `<tr>
                            <td>${p.fullName}</td>
                            <td>${p.country || 'N/A'}</td>
                            <td>${new Date(p.joinedAt).toLocaleString()}</td>
                            <td><button class="icon-btn" data-action="removeP" data-id="${p._id}"><i class="fas fa-user-minus"></i></button></td>
                        </tr>`
            ).join('');

            return `
                        <div class="flex-between" style="flex-wrap:wrap;gap:12px;">
                            <h2><i class="fas fa-user-circle" style="color:var(--primary)"></i> ${session.name}</h2>
                            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                <span class="badge ${closed ? 'closed' : ''}">${closed ? 'CLOSED' : 'OPEN'}</span>
                                <span class="badge" style="background:var(--primary);">${participants.length}/${session.target}</span>
                            </div>
                        </div>
                        <div class="text-secondary" style="margin:4px 0;">Organizer: ${session.organizer}</div>
                        <div class="text-secondary" style="margin:4px 0;">${session.description || ''}</div>
                        ${group ? `
                            <div class="whatsapp-group-banner">
                                <i class="fab fa-whatsapp"></i>
                                <div>
                                    <strong>WhatsApp Group:</strong> ${group.name}
                                    <button class="copy-btn" id="copyGroupLink" style="margin-left:12px;background:rgba(255,255,255,0.2);color:white;border-color:rgba(255,255,255,0.3);">
                                        <i class="fas fa-copy"></i> Copy Link
                                    </button>
                                </div>
                            </div>
                        ` : ''}
                        <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
                        <div class="flex" style="margin:14px 0;">
                            <button class="btn btn-sm" id="exportVcfBtn"><i class="fas fa-download"></i> Export VCF</button>
                            <button class="btn btn-secondary btn-sm" id="closeSessionBtn"><i class="fas fa-lock"></i> Close Manually</button>
                            <button class="btn btn-secondary btn-sm" id="copyJoinLink"><i class="fas fa-link"></i> Copy Join Link</button>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Name</th><th>Country</th><th>Joined</th><th></th></tr></thead>
                                <tbody>${rows || '<tr><td colspan="4" class="text-secondary">No participants yet</td></tr>'}</tbody>
                            </table>
                        </div>
                        <div style="margin-top:12px;">
                            <input class="form-control" id="searchPart" placeholder="Search participants..." style="max-width:300px;">
                        </div>
                    `;
        }

        // ----- ADMIN PANEL -----
        async function renderAdmin() {
            let stats = allSessions.reduce((acc, s) => {
                const participants = allParticipants[s.sessionId] || [];
                acc.total += participants.length;
                acc.sessions += 1;
                return acc;
            }, { total: 0, sessions: 0 });

            let rows = allSessions.map(s => {
                const participants = allParticipants[s.sessionId] || [];
                const g = allGroups.find(gr => gr.sessionId === s.sessionId);
                return `<tr>
                            <td><code>${s.sessionId}</code></td>
                            <td>${s.name}</td>
                            <td>${participants.length}/${s.target}</td>
                            <td><span class="badge ${s.status === 'closed' ? 'closed' : ''}" style="font-size:0.7rem;">${s.status || 'open'}</span></td>
                            <td>${g ? `<i class="fab fa-whatsapp" style="color:var(--whatsapp);"></i>` : '-'}</td>
                            <td><button class="icon-btn" data-action="adminDelete" data-id="${s.sessionId}"><i class="fas fa-trash"></i></button></td>
                        </tr>`;
            }).join('');

            return `
                        <div class="flex-between" style="flex-wrap:wrap;gap:12px;">
                            <h2><i class="fas fa-shield-alt"></i> Admin Panel</h2>
                            <button class="btn btn-secondary btn-sm" id="adminAuthBtn"><i class="fas fa-key"></i> Authenticate</button>
                        </div>
                        <div class="grid-2" style="margin:16px 0;">
                            <div class="card"><strong>Total Contacts</strong><div style="font-size:2rem;">${stats.total}</div></div>
                            <div class="card"><strong>Total Sessions</strong><div style="font-size:2rem;">${stats.sessions}</div></div>
                        </div>
                        <div class="admin-panel" id="adminPanel">
                            <div class="flex-between" style="flex-wrap:wrap;gap:12px;">
                                <h4>All Sessions</h4>
                                <input class="form-control" id="adminSearch" placeholder="Search..." style="max-width:200px;">
                            </div>
                            <div class="table-wrap">
                                <table>
                                    <thead><tr><th>ID</th><th>Name</th><th>Participants</th><th>Status</th><th>Group</th><th></th></tr></thead>
                                    <tbody>${rows}</tbody>
                                </table>
                            </div>
                        </div>
                    `;
        }

        // ============================================================
        // EVENT HANDLERS
        // ============================================================
        function attachEvents() {
            // Navigation
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.addEventListener('click', async () => {
                    const page = b.dataset.page;
                    if (page === 'admin') {
                        const pwd = prompt('Enter admin password:');
                        if (!pwd) return;
                        try {
                            const result = await API.verifyAdmin(pwd);
                            if (!result.valid) {
                                toast('Wrong password', 'fa-times-circle', '#e11d48');
                                return;
                            }
                            toast('Authenticated successfully', 'fa-check', '#0b8a5e');
                        } catch (error) {
                            toast('Authentication failed', 'fa-times-circle', '#e11d48');
                            return;
                        }
                    }
                    await render(page);
                });
            });

            // Theme toggle
            document.getElementById('themeToggle')?.addEventListener('click', () => {
                darkMode = !darkMode;
                document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
                localStorage.setItem('sage_dark', darkMode);
                document.getElementById('themeLabel').innerText = darkMode ? 'Light' : 'Dark';
            });

            // ----- CREATE FORM -----
            const createForm = document.getElementById('createForm');
            if (createForm) {
                createForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const name = document.getElementById('sName').value.trim();
                    const org = document.getElementById('sOrg').value.trim();
                    const target = parseInt(document.getElementById('sTarget').value);
                    const desc = document.getElementById('sDesc').value.trim();
                    const whatsapp = document.getElementById('sWhatsapp').value.trim();
                    const groupName = document.getElementById('sGroupName').value.trim();

                    if (!name || !org || !target || target < 2 || !whatsapp || !groupName) {
                        toast('Please fill all required fields', 'fa-exclamation-circle', '#e11d48');
                        return;
                    }

                    if (!whatsapp.startsWith('https://chat.whatsapp.com/')) {
                        toast('Please enter a valid WhatsApp group link', 'fa-exclamation-circle', '#e11d48');
                        return;
                    }

                    try {
                        const sessionId = genId();
                        
                        // Create session
                        await API.createSession({
                            sessionId,
                            name,
                            organizer: org,
                            target,
                            description: desc
                        });

                        // Create group
                        await API.createGroup({
                            sessionId,
                            name: groupName,
                            link: whatsapp
                        });

                        toast(`Session ${sessionId} created! Share the link with participants.`, 'fa-check-circle',
                            '#0b8a5e');
                        await render('home');
                    } catch (err) {
                        toast('Error creating session: ' + err.message, 'fa-times-circle', '#e11d48');
                        // Save to localStorage as fallback
                        const sessionId = genId();
                        const sessions = JSON.parse(localStorage.getItem('sage_sessions') || '[]');
                        sessions.push({
                            sessionId,
                            name,
                            organizer: org,
                            target,
                            description: desc,
                            status: 'open',
                            createdAt: new Date().toISOString()
                        });
                        localStorage.setItem('sage_sessions', JSON.stringify(sessions));
                        toast('Session saved locally (offline mode)', 'fa-info-circle', '#f59e0b');
                        await render('home');
                    }
                });
            }

            // ----- HOME ACTIONS -----
            document.querySelectorAll('[data-action="join"]').forEach(b => {
                b.addEventListener('click', async () => {
                    const id = b.dataset.id;
                    const session = allSessions.find(s => s.sessionId === id);
                    if (!session) return;
                    const participants = allParticipants[id] || [];
                    if (participants.length >= session.target || session.status === 'closed') {
                        toast('Session is closed', 'fa-times-circle', '#e11d48');
                        return;
                    }
                    showJoinModal(id);
                });
            });

            document.querySelectorAll('[data-action="manage"]').forEach(b => {
                b.addEventListener('click', async () => {
                    currentSessionId = b.dataset.id;
                    await render('dashboard');
                });
            });

            document.querySelectorAll('[data-action="delete"]').forEach(b => {
                b.addEventListener('click', async () => {
                    const id = b.dataset.id;
                    if (confirm('Delete this session and all data?')) {
                        try {
                            await API.deleteSession(id);
                            toast('Session deleted', 'fa-trash', '#e11d48');
                            await render('home');
                        } catch (error) {
                            toast('Error deleting session: ' + error.message, 'fa-times-circle', '#e11d48');
                        }
                    }
                });
            });

            // ----- DASHBOARD ACTIONS -----
            document.getElementById('exportVcfBtn')?.addEventListener('click', () => {
                const participants = allParticipants[currentSessionId] || [];
                if (!participants.length) {
                    toast('No participants to export', 'fa-info-circle', '#f59e0b');
                    return;
                }
                let vcf = participants.map(p =>
                    `BEGIN:VCARD\nVERSION:3.0\nFN:${p.fullName}\nTEL:${p.phone}\nEND:VCARD`
                ).join('\n');
                const blob = new Blob([vcf], { type: 'text/vcard' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'contacts.vcf';
                a.click();
                URL.revokeObjectURL(url);
                toast('VCF exported successfully! Share with the WhatsApp group.', 'fa-download', '#0b8a5e');
            });

            document.getElementById('closeSessionBtn')?.addEventListener('click', async () => {
                try {
                    await API.updateSession(currentSessionId, { status: 'closed' });
                    toast('Session closed manually', 'fa-lock', '#e11d48');
                    await render('dashboard');
                } catch (error) {
                    toast('Error closing session: ' + error.message, 'fa-times-circle', '#e11d48');
                }
            });

            document.getElementById('copyJoinLink')?.addEventListener('click', () => {
                const link = `${window.location.origin}${window.location.pathname}?session=${currentSessionId}`;
                navigator.clipboard?.writeText(link).then(() =>
                    toast('Join link copied! Share it with participants.', 'fa-copy', '#6b4cff')
                ).catch(() => {});
            });

            document.getElementById('copyGroupLink')?.addEventListener('click', () => {
                const group = allGroups.find(g => g.sessionId === currentSessionId);
                if (group) {
                    navigator.clipboard?.writeText(group.link).then(() =>
                        toast('WhatsApp group link copied!', 'fa-copy', '#25D366')
                    ).catch(() => {});
                }
            });

            document.getElementById('searchPart')?.addEventListener('input', function() {
                const q = this.value.toLowerCase();
                const rows = document.querySelectorAll('.table-wrap tbody tr');
                rows.forEach(r => {
                    const name = r.children[0]?.textContent?.toLowerCase() || '';
                    r.style.display = name.includes(q) ? '' : 'none';
                });
            });

            document.querySelectorAll('[data-action="removeP"]').forEach(b => {
                b.addEventListener('click', async () => {
                    const participantId = b.dataset.id;
                    if (confirm('Remove this participant?')) {
                        try {
                            await API.deleteParticipant(currentSessionId, participantId);
                            toast('Participant removed', 'fa-user-minus', '#e11d48');
                            await render('dashboard');
                        } catch (error) {
                            toast('Error removing participant: ' + error.message, 'fa-times-circle', '#e11d48');
                        }
                    }
                });
            });

            // ----- ADMIN ACTIONS -----
            document.getElementById('adminSearch')?.addEventListener('input', function() {
                const q = this.value.toLowerCase();
                document.querySelectorAll('#adminPanel tbody tr').forEach(r => {
                    const txt = r.textContent.toLowerCase();
                    r.style.display = txt.includes(q) ? '' : 'none';
                });
            });

            document.querySelectorAll('[data-action="adminDelete"]').forEach(b => {
                b.addEventListener('click', async () => {
                    const id = b.dataset.id;
                    if (confirm('Delete session (admin)?')) {
                        try {
                            await API.deleteSession(id);
                            toast('Session deleted by admin', 'fa-trash', '#e11d48');
                            await render('admin');
                        } catch (error) {
                            toast('Error deleting session: ' + error.message, 'fa-times-circle', '#e11d48');
                        }
                    }
                });
            });
        }

        // ============================================================
        // JOIN MODAL
        // ============================================================
        function showJoinModal(sessionId) {
            const session = allSessions.find(s => s.sessionId === sessionId);
            if (!session) return;

            const participants = allParticipants[sessionId] || [];
            const group = allGroups.find(g => g.sessionId === sessionId);

            const closed = participants.length >= session.target || session.status === 'closed';
            if (closed) {
                toast('Session is closed', 'fa-times', '#e11d48');
                return;
            }

            renderModal(`
                        <div class="modal" onclick="if(event.target===this) closeModal()">
                            <div class="modal-content">
                                <h3><i class="fas fa-user-plus" style="color:var(--primary)"></i> Join ${session.name}</h3>
                                <p class="text-secondary">Organizer: ${session.organizer} · ${participants.length}/${session.target}</p>
                                ${group ? `
                                    <div class="whatsapp-group-banner" style="margin:12px 0;padding:10px 16px;">
                                        <i class="fab fa-whatsapp"></i>
                                        <div style="font-size:0.9rem;">
                                            <strong>Join the WhatsApp Group</strong><br>
                                            <span style="font-size:0.8rem;">You must join to receive the VCF file</span>
                                            <button class="copy-btn" id="modalCopyGroup" style="margin-left:8px;background:rgba(255,255,255,0.2);color:white;border-color:rgba(255,255,255,0.3);font-size:0.7rem;">
                                                <i class="fas fa-copy"></i> Copy Link
                                            </button>
                                        </div>
                                    </div>
                                ` : ''}
                                <form id="joinForm">
                                    <div class="form-group">
                                        <label>Full Name *</label>
                                        <input class="form-control" id="jName" placeholder="John Doe" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Phone (international) *</label>
                                        <input class="form-control" id="jPhone" placeholder="+233501234567" required>
                                        <small class="text-secondary">Format: +[country code][number]</small>
                                    </div>
                                    <div class="form-group">
                                        <label>Country</label>
                                        <input class="form-control" id="jCountry" placeholder="Ghana">
                                    </div>
                                    <div class="form-group">
                                        <label>
                                            <input type="checkbox" id="jConfirm"> 
                                            I confirm the information is accurate
                                        </label>
                                    </div>
                                    <button class="btn" type="submit"><i class="fas fa-check"></i> Submit</button>
                                </form>
                            </div>
                        </div>
                    `);

            document.getElementById('modalCopyGroup')?.addEventListener('click', () => {
                if (group) {
                    navigator.clipboard?.writeText(group.link).then(() =>
                        toast('WhatsApp group link copied!', 'fa-copy', '#25D366')
                    ).catch(() => {});
                }
            });

            document.getElementById('joinForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('jName').value.trim();
                const phone = document.getElementById('jPhone').value.trim();
                const country = document.getElementById('jCountry').value.trim() || 'Unknown';
                const confirm = document.getElementById('jConfirm').checked;

                if (!name || !phone || !confirm) {
                    toast('Fill all fields and confirm', 'fa-exclamation', '#e11d48');
                    return;
                }

                if (!phone.match(/^\+[1-9]\d{6,14}$/)) {
                    toast('Invalid international format. Use +[country code][number]', 'fa-phone', '#e11d48');
                    return;
                }

                try {
                    await API.addParticipant({
                        sessionId,
                        fullName: name,
                        phone,
                        country
                    });

                    toast('Welcome to the session! Please join the WhatsApp group if you haven\'t.', 'fa-check',
                        '#0b8a5e');
                    closeModal();
                    await render('home');
                } catch (err) {
                    toast('Error joining: ' + err.message, 'fa-times-circle', '#e11d48');
                }
            });
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================
        (async function init() {
            // Set theme label
            document.getElementById('themeLabel').innerText = darkMode ? 'Light' : 'Dark';

            // Initial load
            await loadAllData();

            // Handle session link parameter
            const params = new URLSearchParams(window.location.search);
            const sid = params.get('session');
            if (sid) {
                const session = allSessions.find(s => s.sessionId === sid);
                if (session) {
                    currentSessionId = sid;
                    setTimeout(() => render('dashboard'), 100);
                    return;
                }
            }

            render('home');
        })();
    </script>
</body>
</html>
